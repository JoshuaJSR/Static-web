<!-- COMPONENTE NAVBAR REUTILIZABLE O COMPARTIDA CON LAS OTRAS PAGINAS-->
<mat-sidenav-container>

  <mat-sidenav #sidenav mode="over">
    <mat-nav-list>
      <a mat-list-item routerLink="/home" (click)="sidenav.close()">Home</a>
      <a mat-list-item routerLink="/about" (click)="sidenav.close()">About</a>
      <a mat-list-item routerLink="/contact" (click)="sidenav.close()">Contact</a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class = "navbar">

      <button class="btn-hamburger" mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>

      <span>My Angular App</span>
      <span class="spacer"></span>

      <div class="menu-desktop">
        <a mat-button routerLink="/home">Home</a>
        <a mat-button routerLink="/about">About</a>
        <a mat-button routerLink="/contact">Contact</a>
      </div>

    </mat-toolbar>
  </mat-sidenav-content>

</mat-sidenav-container>
<!--PASOS PARA CREAR UN COMPONENTE CON ANGULAR
  1. Crear el componente con el comando: ng g c shared/navbar (nombre del componente)
  2-Importarlo donde se va usar, un componente compartido va en app.ts 
  3-Usar el selector del componente en el html donde se quiera mostrar, en este caso en app.html se pone <app-navbar></app-navbar>

  PORQUE IMPORTAR COMPONENTES EN APP.TS?
  Porque es el componente raiz, el que se carga al iniciar la aplicacion, y si queremos que un componente se muestre en todas las paginas, lo importamos en app.ts para que este disponible en toda la aplicacion.
-->

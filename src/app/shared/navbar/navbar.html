<!--PASOS PARA CREAR UN COMPONENTE CON ANGULAR
  1. Crear el componente con el comando: ng g c shared/navbar (nombre del componente)
  2-Importarlo donde se va usar, un componente compartido va en app.ts 
  3-Usar el selector del componente en el html donde se quiera mostrar, en este caso en app.html se pone <app-navbar></app-navbar>

  PORQUE IMPORTAR COMPONENTES EN APP.TS?
  Porque es el componente raiz, el que se carga al iniciar la aplicacion, y si queremos que un componente se muestre en todas las paginas, 
  lo importamos en app.ts para que este disponible en toda la aplicacion.
-->
